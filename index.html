<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふんわり勉強タイマー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fef9f3;
            --main-pink: #fbc4ab;
            --sub-cream: #ffedd8;
            --text-color: #6d5952;
            --font-number: "Bodoni Moda", serif;
            --font-jp: "Noto Sans JP", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-jp);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
            position: relative;
        }

        /* 🎵 音楽切り替えボタン（右上に配置） */
        .bgm-controller {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100; /* 一番手前に表示 */
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #ffffff;
            border: 2px solid var(--sub-cream);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(243, 224, 211, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .bgm-controller:hover {
            border-color: var(--main-pink);
            transform: translateY(-1px);
        }
        .bgm-icon {
            font-size: 1.1rem;
        }
        .bgm-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-color);
        }
        /* 再生中のふわふわ光るエフェクト */
        .bgm-controller.playing {
            background-color: var(--sub-cream);
            border-color: var(--main-pink);
        }

        /* 画面共通スタイル */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: scale(0.95);
            background-color: transparent;
            padding: 20px;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: 300;
        }

        p {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #8a736a;
        }

        .record-box {
            background-color: #ffffff;
            border: 1px dashed var(--main-pink);
            padding: 12px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 0.95rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(243, 224, 211, 0.2);
        }
        .record-box span {
            font-family: var(--font-number);
            font-size: 1.4rem;
            font-weight: bold;
            color: #e29578;
            margin: 0 4px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        button {
            font-family: var(--font-jp);
            background-color: #ffffff;
            border: 2px solid var(--sub-cream);
            color: var(--text-color);
            padding: 15px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(243, 224, 211, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--main-pink);
            color: white;
            border-color: var(--main-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 196, 171, 0.6);
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid #d3c4be;
            box-shadow: none;
            margin-top: 20px;
            font-size: 0.95rem;
            padding: 10px 20px;
        }
        button.secondary:hover {
            background-color: #d3c4be;
            color: white;
        }

        .spinner-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background: #fff;
            padding: 15px 30px;
            border-radius: 40px;
            border: 2px solid var(--sub-cream);
            box-shadow: 0 4px 15px rgba(243, 224, 211, 0.2);
        }
        .spinner-display {
            font-family: var(--font-number);
            font-size: 3rem;
            font-weight: 400;
            width: 90px;
            text-align: center;
            user-select: none;
        }
        .spinner-unit {
            font-size: 1.2rem;
            color: var(--text-color);
            margin-right: 10px;
        }
        .spinner-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .spinner-arrow {
            background: none;
            border: none;
            box-shadow: none;
            padding: 0;
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: #bfa397;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .spinner-arrow:hover {
            background: none;
            color: var(--main-pink);
            transform: scale(1.1);
            box-shadow: none;
        }

        .timer-container-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .timer-display {
            font-family: var(--font-number);
            font-size: 6rem;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .status-badge {
            background-color: var(--sub-cream);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .cycle-count {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .cycle-count span {
            font-family: var(--font-number);
            font-size: 1.5rem;
            font-weight: bold;
        }

        @keyframes soft-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08) translateY(-10px); }
        }

        .cute-alarm-bg {
            background-color: #fff0f3 !important;
        }

        .cute-poyo {
            animation: soft-bounce 0.8s infinite ease-in-out;
        }

        .alarm-overlay {
            display: none;
            position: absolute;
            top: 12%;
            background: #ffb5a7;
            color: white;
            padding: 12px 28px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 8px 20px rgba(251, 181, 167, 0.4);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <audio id="bgm-player" src="music1.mp3" loop></audio>

    <div id="bgm-btn" class="bgm-controller" onclick="toggleBGM()">
        <span id="bgm-icon" class="bgm-icon">🎵</span>
        <span id="bgm-text" class="bgm-text">Music: OFF</span>
    </div>

    <div id="screen-main" class="screen active">
        <h1>Study Room</h1>
        <p>今日も自分のペースで、心地よく。</p>
        
        <div class="record-box">
            今日の勉強時間: <span id="today-record-time">0分</span>
        </div>

        <div class="btn-container">
            <button onclick="changeScreen('screen-class-select')">授業記録モード</button>
            <button onclick="changeScreen('screen-self-select')">自習モード</button>
        </div>
    </div>

    <div id="screen-class-select" class="screen">
        <h2>授業時間をえらぶ</h2>
        <div class="grid-buttons">
            <button onclick="startClassTimer(60)">1時間</button>
            <button onclick="startClassTimer(80)">1時間20分</button>
            <button onclick="startClassTimer(90)">1時間30分</button>
            <button onclick="startClassTimer(200)">3時間20分</button>
        </div>
        <button class="secondary" onclick="changeScreen('screen-main')">もどる</button>
    </div>

    <div id="screen-self-select" class="screen">
        <h2>自習スタイルをえらぶ</h2>
        <div class="btn-container">
            <button onclick="startPomodoro()">ポモドーロ集中</button>
            <button onclick="startStopwatch()">ストップウォッチ</button>
            <button onclick="changeScreen('screen-custom-timer-set')">タイマー（カスタム）</button>
        </div>
        <button class="secondary" onclick="changeScreen('screen-main')">もどる</button>
    </div>

    <div id="screen-custom-timer-set" class="screen">
        <h2>タイマー時間をセット</h2>
        
        <div class="spinner-container">
            <div id="custom-minutes-display" class="spinner-display">10</div>
            <div class="spinner-unit">分</div>
            <div class="spinner-nav">
                <button class="spinner-arrow" onclick="adjustMinutes(1)">▲</button>
                <button class="spinner-arrow" onclick="adjustMinutes(-1)">▼</button>
            </div>
        </div>

        <div class="btn-container">
            <button onclick="startCustomTimer()">タイマーを開始する</button>
        </div>
        <button class="secondary" onclick="changeScreen('screen-self-select')">もどる</button>
    </div>

    <div id="screen-timer" class="screen">
        <div id="alarm-banner" class="alarm-overlay">おつかれさま！時間になりました</div>
        
        <div id="timer-box" class="timer-container-box">
            <div id="timer-status" class="status-badge">授業記録</div>
            <div id="pomo-cycle" class="cycle-count" style="display: none;">ただいま <span>1</span> サイクル目</div>
            <div id="timer-text" class="timer-display">00:00:00</div>
        </div>
        
        <div class="btn-container" style="flex-direction: row; justify-content: center; z-index: 10;">
            <button id="btn-pause" onclick="togglePause()">一時停止</button>
            <button id="btn-stop" class="secondary" style="margin-top:0;" onclick="stopTimer()">終了する</button>
        </div>
    </div>

    <script>
        let timerInterval = null;
        let totalSeconds = 0;
        let elapsedSecondsInSession = 0; 
        let isPaused = false;
        let currentMode = ''; 
        let pomodoroCycle = 1;
        let currentCustomMinutes = 10;

        // オーディオ（アラーム音用）
        let audioCtx = null;
        
        // 🎵 BGM再生・停止フラグ
        let isBGMPlaying = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 🎵 BGMのオンオフ切り替え
        function toggleBGM() {
            initAudio(); // アラームの準備も同時に行う
            const player = document.getElementById('bgm-player');
            const btn = document.getElementById('bgm-btn');
            const icon = document.getElementById('bgm-icon');
            const text = document.getElementById('bgm-text');

            if (!isBGMPlaying) {
                // 再生する
                player.play().then(() => {
                    isBGMPlaying = true;
                    btn.classList.add('playing');
                    icon.innerText = '🎶';
                    text.innerText = 'Music: ON';
                }).catch(err => {
                    alert('音楽ファイル「music1.mp3」が見つからないか、ブラウザにブロックされました。ファイルを同じフォルダに置いてみてください。');
                });
            } else {
                // 停止する
                player.pause();
                isBGMPlaying = false;
                btn.classList.remove('playing');
                icon.innerText = '🎵';
                text.innerText = 'Music: OFF';
            }
        }

        window.onload = function() {
            displayTodayRecord();
        };

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function displayTodayRecord() {
            const todayStr = getTodayString();
            const savedDate = localStorage.getItem('study_date');
            
            if (savedDate !== todayStr) {
                localStorage.setItem('study_date', todayStr);
                localStorage.setItem('study_today_minutes', '0');
            }

            const todayMinutes = parseFloat(localStorage.getItem('study_today_minutes') || '0');
            document.getElementById('today-record-time').innerText = todayMinutes.toFixed(1) + '分';
        }

        function saveStudyTime(seconds) {
            if (seconds <= 0) return;
            displayTodayRecord();

            const minutesEarned = seconds / 60;
            const currentTotal = parseFloat(localStorage.getItem('study_today_minutes') || '0');
            localStorage.setItem('study_today_minutes', currentTotal + minutesEarned);
            displayTodayRecord();
        }

        function playPipSound() {
            initAudio(); 
            soundPulse(0); soundPulse(0.12);
            soundPulse(0.4); soundPulse(0.52);
            soundPulse(0.8); soundPulse(0.92);
        }

        function soundPulse(delayTime) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime + delayTime); 
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + delayTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delayTime + 0.09);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + delayTime);
            osc.stop(audioCtx.currentTime + delayTime + 0.1);
        }

        function adjustMinutes(amount) {
            currentCustomMinutes += amount;
            if (currentCustomMinutes < 1) currentCustomMinutes = 1;
            if (currentCustomMinutes > 999) currentCustomMinutes = 999;
            document.getElementById('custom-minutes-display').innerText = currentCustomMinutes;
        }

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            
            document.body.classList.remove('cute-alarm-bg');
            document.getElementById('timer-box').classList.remove('cute-poyo');
            document.getElementById('alarm-banner').style.display = 'none';
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            const hStr = h > 0 ? String(h).padStart(2, '0') + ':' : '';
            const mStr = String(m).padStart(2, '0');
            const sStr = String(s).padStart(2, '0');
            return `${hStr}${mStr}:${sStr}`;
        }

        function updateDisplay() {
            document.getElementById('timer-text').innerText = formatTime(totalSeconds);
        }

        // 1. 授業記録モード 開始
        function startClassTimer(minutes) {
            initAudio(); 
            currentMode = 'class';
            totalSeconds = minutes * 60;
            elapsedSecondsInSession = 0;
            isPaused = false;
            
            document.getElementById('timer-status').innerText = '授業記録';
            document.getElementById('pomo-cycle').style.display = 'none';
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';
            
            updateDisplay();
            changeScreen('screen-timer');
            
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        elapsedSecondsInSession++;
                        updateDisplay();
                    } else {
                        clearInterval(timerInterval);
                        triggerAlarmEffect();
                    }
                }
            }, 1000);
        }

        // 2. 自習：ポモドーロモード 開始
        function startPomodoro() {
            initAudio(); 
            currentMode = 'pomodoro-work';
            totalSeconds = 25 * 60; 
            elapsedSecondsInSession = 0;
            isPaused = false;
            pomodoroCycle = 1;

            document.getElementById('timer-status').innerText = 'ポモドーロ：集中タイム';
            document.getElementById('pomo-cycle').style.display = 'block';
            document.getElementById('pomo-cycle').querySelector('span').innerText = pomodoroCycle;
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';

            updateDisplay();
            changeScreen('screen-timer');

            runPomodoroTimer();
        }

        function runPomodoroTimer() {
            if(timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        if (currentMode === 'pomodoro-work') {
                            elapsedSecondsInSession++;
                        }
                        updateDisplay();
                    } else {
                        clearInterval(timerInterval);
                        
                        if (currentMode === 'pomodoro-work') {
                            playPipSound();
                            document.getElementById('alarm-banner').innerText = 'おつかれさま！5分休憩してね';
                            document.body.classList.add('cute-alarm-bg');
                            document.getElementById('timer-box').classList.add('cute-poyo');
                            document.getElementById('alarm-banner').style.display = 'block';
                            
                            setTimeout(() => {
                                document.body.classList.remove('cute-alarm-bg');
                                document.getElementById('timer-box').classList.remove('cute-poyo');
                                document.getElementById('alarm-banner').style.display = 'none';
                                
                                currentMode = 'pomodoro-rest';
                                totalSeconds = 5 * 60; 
                                document.getElementById('timer-status').innerText = 'ポモドーロ：休憩タイム';
                                updateDisplay();
                                runPomodoroTimer();
                            }, 4000);

                        } else if (currentMode === 'pomodoro-rest') {
                            pomodoroCycle++;
                            currentMode = 'pomodoro-work';
                            totalSeconds = 25 * 60;
                            document.getElementById('timer-status').innerText = 'ポモドーロ：集中タイム';
                            document.getElementById('pomo-cycle').querySelector('span').innerText = pomodoroCycle;
                            updateDisplay();
                            runPomodoroTimer();
                        }
                    }
                }
            }, 1000);
        }

        // 3. 自習：ストップウォッチモード 開始
        function startStopwatch() {
            initAudio();
            currentMode = 'stopwatch';
            totalSeconds = 0;
            elapsedSecondsInSession = 0;
            isPaused = false;

            document.getElementById('timer-status').innerText = 'ストップウォッチ（自習）';
            document.getElementById('pomo-cycle').style.display = 'none';
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';

            updateDisplay();
            changeScreen('screen-timer');

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    totalSeconds++;
                    elapsedSecondsInSession++;
                    updateDisplay();
                }
            }, 1000);
        }

        // 4. 自習：カスタムタイマーモード 開始
        function startCustomTimer() {
            initAudio(); 
            currentMode = 'custom';
            totalSeconds = currentCustomMinutes * 60;
            elapsedSecondsInSession = 0;
            isPaused = false;

            document.getElementById('timer-status').innerText = 'カスタムタイマー';
            document.getElementById('pomo-cycle').style.display = 'none';
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';

            updateDisplay();
            changeScreen('screen-timer');

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        elapsedSecondsInSession++;
                        updateDisplay();
                    } else {
                        clearInterval(timerInterval);
                        triggerAlarmEffect();
                    }
                }
            }, 1000);
        }

        function triggerAlarmEffect() {
            playPipSound(); 

            document.getElementById('alarm-banner').innerText = 'おつかれさま！時間になりました';
            document.body.classList.add('cute-alarm-bg'); 
            document.getElementById('timer-box').classList.add('cute-poyo'); 
            document.getElementById('alarm-banner').style.display = 'block';
            
            setTimeout(() => {
                stopTimer();
            }, 4000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '再開する' : '一時停止';
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            
            saveStudyTime(elapsedSecondsInSession);
            elapsedSecondsInSession = 0;

            changeScreen('screen-main');
        }
    </script>
</body>
</html>
