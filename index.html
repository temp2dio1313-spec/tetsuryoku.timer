<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふんわり勉強タイマー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fef9f3;
            --main-pink: #fbc4ab;
            --sub-cream: #ffedd8;
            --text-color: #6d5952;
            --font-number: "Bodoni Moda", serif;
            --font-jp: "Noto Sans JP", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-jp);
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 画面共通スタイル */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: scale(0.95);
            background-color: var(--bg-color);
            padding: 20px;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: 300;
        }

        p {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #8a736a;
        }

        /* 記録表示エリア */
        .record-box {
            background-color: #ffffff;
            border: 1px dashed var(--main-pink);
            padding: 12px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 0.95rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(243, 224, 211, 0.2);
        }
        .record-box span {
            font-family: var(--font-number);
            font-size: 1.4rem;
            font-weight: bold;
            color: #e29578;
            margin: 0 4px;
        }

        /* ボタンデザイン */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        button {
            font-family: var(--font-jp);
            background-color: #ffffff;
            border: 2px solid var(--sub-cream);
            color: var(--text-color);
            padding: 15px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(243, 224, 211, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--main-pink);
            color: white;
            border-color: var(--main-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 196, 171, 0.6);
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid #d3c4be;
            box-shadow: none;
            margin-top: 20px;
            font-size: 0.95rem;
            padding: 10px 20px;
        }
        button.secondary:hover {
            background-color: #d3c4be;
            color: white;
        }

        /* 時間設定フォーム（自習タイマー用） */
        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            background: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid var(--sub-cream);
        }
        .input-group input {
            font-family: var(--font-number);
            font-size: 1.5rem;
            width: 60px;
            border: none;
            outline: none;
            text-align: center;
            color: var(--text-color);
        }
        .input-group label {
            font-size: 1rem;
        }

        /* タイマー表示 */
        .timer-display {
            font-family: var(--font-number);
            font-size: 6rem;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .status-badge {
            background-color: var(--sub-cream);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .cycle-count {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .cycle-count span {
            font-family: var(--font-number);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 画面揺れエフェクト（アラーム用） */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .shaking {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
            background-color: #ffe5ec !important;
        }

        .alarm-overlay {
            display: none;
            position: absolute;
            top: 10%;
            background: #ffb5a7;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: shake 0.5s infinite;
        }
    </style>
</head>
<body>

    <div id="screen-main" class="screen active">
        <h1>Study Room</h1>
        <p>今日も自分のペースで、心地よく。</p>
        
        <div class="record-box">
            これまでの勉強時間: <span id="total-record-time">0分</span>
        </div>

        <div class="btn-container">
            <button onclick="changeScreen('screen-class-select')">授業記録モード</button>
            <button onclick="changeScreen('screen-self-select')">自習モード</button>
        </div>
    </div>

    <div id="screen-class-select" class="screen">
        <h2>授業時間をえらぶ</h2>
        <div class="grid-buttons">
            <button onclick="startClassTimer(60)">1時間</button>
            <button onclick="startClassTimer(80)">1時間20分</button>
            <button onclick="startClassTimer(90)">1時間30分</button>
            <button onclick="startClassTimer(200)">3時間20分</button>
        </div>
        <button class="secondary" onclick="changeScreen('screen-main')">もどる</button>
    </div>

    <div id="screen-self-select" class="screen">
        <h2>自習スタイルをえらぶ</h2>
        <div class="btn-container">
            <button onclick="startPomodoro()">ポモドーロ集中</button>
            <button onclick="startStopwatch()">ストップウォッチ</button>
            <button onclick="changeScreen('screen-custom-timer-set')">タイマー（カスタム）</button>
        </div>
        <button class="secondary" onclick="changeScreen('screen-main')">もどる</button>
    </div>

    <div id="screen-custom-timer-set" class="screen">
        <h2>タイマー時間をセット</h2>
        <div class="input-group">
            <input type="number" id="custom-minutes" min="1" max="999" value="10">
            <label for="custom-minutes">分</label>
        </div>
        <div class="btn-container">
            <button onclick="startCustomTimer()">タイマーを開始する</button>
        </div>
        <button class="secondary" onclick="changeScreen('screen-self-select')">もどる</button>
    </div>

    <div id="screen-timer" class="screen">
        <div id="alarm-banner" class="alarm-overlay">おつかれさま！時間になりました</div>
        <div id="timer-status" class="status-badge">授業記録</div>
        <div id="pomo-cycle" class="cycle-count" style="display: none;">ただいま <span>1</span> サイクル目</div>
        <div id="timer-text" class="timer-display">00:00:00</div>
        
        <div class="btn-container" style="flex-direction: row; justify-content: center;">
            <button id="btn-pause" onclick="togglePause()">一時停止</button>
            <button id="btn-stop" class="secondary" style="margin-top:0;" onclick="stopTimer()">終了する</button>
        </div>
    </div>

    <script>
        // タイマー制御用の変数
        let timerInterval = null;
        let totalSeconds = 0;
        let elapsedSecondsInSession = 0; // 今回のセッションで実際に勉強した秒数
        let isPaused = false;
        let currentMode = ''; // 'class', 'pomodoro-work', 'pomodoro-rest', 'stopwatch', 'custom'
        let pomodoroCycle = 1;

        // ページ読み込み時に記録を表示
        window.onload = function() {
            displayTotalRecord();
        };

        // 総勉強時間の表示を更新する関数
        function displayTotalRecord() {
            const totalMinutes = parseFloat(localStorage.getItem('study_total_minutes') || '0');
            // 小数点第1位まで表示（きれいに丸める）
            document.getElementById('total-record-time').innerText = totalMinutes.toFixed(1) + '分';
        }

        // 勉強時間をローカルストレージに加算保存する関数
        function saveStudyTime(seconds) {
            if (seconds <= 0) return;
            const minutesEarned = seconds / 60;
            const currentTotal = parseFloat(localStorage.getItem('study_total_minutes') || '0');
            localStorage.setItem('study_total_minutes', currentTotal + minutesEarned);
            displayTotalRecord();
        }

        // 全画面切り替えロジック
        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            
            // アラームエフェクトの解除
            document.getElementById('screen-timer').classList.remove('shaking');
            document.getElementById('alarm-banner').style.display = 'none';
        }

        // 時間フォーマット（HH:MM:SS または MM:SS）
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;

            const hStr = h > 0 ? String(h).padStart(2, '0') + ':' : '';
            const mStr = String(m).padStart(2, '0');
            const sStr = String(s).padStart(2, '0');

            return `${hStr}${mStr}:${sStr}`;
        }

        function updateDisplay() {
            document.getElementById('timer-text').innerText = formatTime(totalSeconds);
        }

        // 1. 授業記録モード 開始
        function startClassTimer(minutes) {
            currentMode = 'class';
            totalSeconds = minutes * 60;
            elapsedSecondsInSession = 0;
            isPaused = false;
            
            document.getElementById('timer-status').innerText = '授業記録';
            document.getElementById('pomo-cycle').style.display = 'none';
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';
            
            updateDisplay();
            changeScreen('screen-timer');
            
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        elapsedSecondsInSession++;
                        updateDisplay();
                    } else {
                        // 時間ぴったりで終了した場合
                        clearInterval(timerInterval);
                        triggerAlarmEffect('授業時間が終了しました！お疲れ様でした。');
                    }
                }
            }, 1000);
        }

        // 2. 自習：ポモドーロモード 開始
        function startPomodoro() {
            currentMode = 'pomodoro-work';
            totalSeconds = 25 * 60; 
            elapsedSecondsInSession = 0;
            isPaused = false;
            pomodoroCycle = 1;

            document.getElementById('timer-status').innerText = 'ポモドーロ：集中タイム';
            document.getElementById('pomo-cycle').style.display = 'block';
            document.getElementById('pomo-cycle').querySelector('span').innerText = pomodoroCycle;
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';

            updateDisplay();
            changeScreen('screen-timer');

            runPomodoroTimer();
        }

        function runPomodoroTimer() {
            if(timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        if (currentMode === 'pomodoro-work') {
                            elapsedSecondsInSession++; // 休憩時間は勉強時間にカウントしない
                        }
                        updateDisplay();
                    } else {
                        clearInterval(timerInterval);
                        
                        if (currentMode === 'pomodoro-work') {
                            // 25分終了：揺れるエフェクトを発動して5分休憩へ
                            document.getElementById('alarm-banner').innerText = 'おつかれさま！5分休憩してね';
                            document.getElementById('screen-timer').classList.add('shaking');
                            document.getElementById('alarm-banner').style.display = 'block';
                            
                            setTimeout(() => {
                                document.getElementById('screen-timer').classList.remove('shaking');
                                document.getElementById('alarm-banner').style.display = 'none';
                                
                                currentMode = 'pomodoro-rest';
                                totalSeconds = 5 * 60; // 5分休憩
                                document.getElementById('timer-status').innerText = 'ポモドーロ：休憩タイム';
                                updateDisplay();
                                runPomodoroTimer();
                            }, 4000);

                        } else if (currentMode === 'pomodoro-rest') {
                            // 5分休憩終了：次のサイクルへ
                            pomodoroCycle++;
                            currentMode = 'pomodoro-work';
                            totalSeconds = 25 * 60;
                            document.getElementById('timer-status').innerText = 'ポモドーロ：集中タイム';
                            document.getElementById('pomo-cycle').querySelector('span').innerText = pomodoroCycle;
                            updateDisplay();
                            runPomodoroTimer();
                        }
                    }
                }
            }, 1000);
        }

        // 3. 自習：ストップウォッチモード 開始
        function startStopwatch() {
            currentMode = 'stopwatch';
            totalSeconds = 0;
            elapsedSecondsInSession = 0;
            isPaused = false;

            document.getElementById('timer-status').innerText = 'ストップウォッチ（自習）';
            document.getElementById('pomo-cycle').style.display = 'none';
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';

            updateDisplay();
            changeScreen('screen-timer');

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    totalSeconds++;
                    elapsedSecondsInSession++;
                    updateDisplay();
                }
            }, 1000);
        }

        // 4. 自習：カスタムタイマーモード 開始
        function startCustomTimer() {
            const minutesInput = document.getElementById('custom-minutes').value;
            const minutes = parseInt(minutesInput, 10);
            
            if (isNaN(minutes) || minutes <= 0) {
                alert('1分以上の正しい時間を入力してください。');
                return;
            }

            currentMode = 'custom';
            totalSeconds = minutes * 60;
            elapsedSecondsInSession = 0;
            isPaused = false;

            document.getElementById('timer-status').innerText = 'カスタムタイマー';
            document.getElementById('pomo-cycle').style.display = 'none';
            document.getElementById('btn-pause').style.display = 'inline-block';
            document.getElementById('btn-pause').innerText = '一時停止';

            updateDisplay();
            changeScreen('screen-timer');

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        elapsedSecondsInSession++;
                        updateDisplay();
                    } else {
                        // 時間ぴったりで終了した場合
                        clearInterval(timerInterval);
                        triggerAlarmEffect('時間になりました！お疲れ様でした。');
                    }
                }
            }, 1000);
        }

        // アラームエフェクト発動ロジック（授業＆カスタムタイマー終了用）
        function triggerAlarmEffect(message) {
            document.getElementById('alarm-banner').innerText = 'おつかれさま！時間になりました';
            document.getElementById('screen-timer').classList.add('shaking');
            document.getElementById('alarm-banner').style.display = 'block';
            
            // 4秒間揺れたあとに自動終了して記録を保存
            setTimeout(() => {
                stopTimer();
            }, 4000);
        }

        // 一時停止・再開
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? '再開する' : '一時停止';
        }

        // タイマー終了（メインに戻る ＆ 時間の記録）
        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            
            // 今回のセッションで勉強した時間を保存
            saveStudyTime(elapsedSecondsInSession);
            elapsedSecondsInSession = 0;

            changeScreen('screen-main');
        }
    </script>
</body>
</html>
