<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellectual Study Timer</title>
    <style>
        :root {
            --bg-color: #0a1118;       /* 知的なディープネイビー */
            --panel-bg: #121f2c;       /* パネル背景 */
            --accent-blue: #5e97cb;   /* 洗練されたシアンブルー */
            --text-main: #f1f5f9;     /* メイン文字 */
            --text-sub: #64748b;      /* サブ文字 */
            --border-color: rgba(94, 151, 203, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            padding: 35px 30px;
            box-sizing: border-box;
        }

        /* ヘッダー */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--text-main);
            margin: 0 0 4px 0;
        }

        .header p {
            font-size: 11px;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 0;
        }

        /* タブメニュー */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            padding: 12px 5px;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            letter-spacing: 0.05em;
        }

        .tab-btn:hover {
            color: var(--accent-blue);
        }

        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom: 2px solid var(--accent-blue);
            font-weight: 600;
        }

        /* 表示エリア */
        .display-panel {
            text-align: center;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.15);
            padding: 20px 0;
            border-radius: 6px;
        }

        .status-label {
            font-size: 11px;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .time-display {
            font-size: 52px;
            font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            font-weight: 400;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        /* コントロールエリア */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 10px 0;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100px;
            letter-spacing: 0.05em;
        }

        .btn:hover {
            background: rgba(94, 151, 203, 0.1);
        }

        .btn.active-pause {
            background: var(--accent-blue);
            color: var(--panel-bg);
            font-weight: 600;
        }

        /* 設定エリア（タイマー用） */
        .inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .inputs input {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 8px;
            width: 55px;
            text-align: center;
            font-size: 15px;
            border-radius: 4px;
        }

        .inputs input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .inputs label {
            font-size: 12px;
            color: var(--text-sub);
            margin-right: 4px;
        }

        .hidden {
            display: none !important;
        }

        /* 勉強時間記録ログ */
        .log-panel {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
            margin-top: 10px;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .log-title {
            font-size: 12px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 11px;
            cursor: pointer;
            opacity: 0.6;
        }

        .clear-btn:hover {
            opacity: 1;
        }

        .total-box {
            background: rgba(94, 151, 203, 0.05);
            border: 1px dashed rgba(94, 151, 203, 0.2);
            border-radius: 4px;
            padding: 12px;
            text-align: center;
        }

        .total-time {
            font-size: 20px;
            font-family: 'SF Mono', monospace;
            color: var(--text-main);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>STUDY CHRONO</h1>
        <p>Intellectual Concentration Cell</p>
    </div>

    <!-- タブ -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('clock')">CLOCK</button>
        <button class="tab-btn" onclick="switchMode('pomodoro')">POMODORO</button>
        <button class="tab-btn" onclick="switchMode('timer')">TIMER</button>
        <button class="tab-btn" onclick="switchMode('stopwatch')">STOPWATCH</button>
    </div>

    <!-- メインディスプレイ -->
    <div class="display-panel">
        <div id="statusLabel" class="status-label">CURRENT TIME</div>
        <div id="timeDisplay" class="time-display">00:00:00</div>
    </div>

    <!-- タイマー用入力 -->
    <div id="timerInputs" class="inputs hidden">
        <input type="number" id="inputMin" min="0" max="180" value="25">
        <label>MIN</label>
        <input type="number" id="inputSec" min="0" max="59" value="0">
        <label>SEC</label>
    </div>

    <!-- コントロールボタン -->
    <div id="controlPanel" class="controls hidden">
        <button id="startBtn" class="btn" onclick="toggleStart()">START</button>
        <button id="resetBtn" class="btn" onclick="reset()">RESET</button>
    </div>

    <!-- 勉強時間レコーダー -->
    <div class="log-panel">
        <div class="log-header">
            <div class="log-title">Today's Study Time</div>
            <button class="clear-btn" onclick="clearLog()">Reset Data</button>
        </div>
        <div class="total-box">
            <div id="totalDisplay" class="total-time">00h 00m 00s</div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'clock';
    let timerId = null;
    let isRunning = false;
    
    // 高精度タイムスタンプ管理用
    let startTime = 0;
    let elapsedTimeAtPause = 0; // 一時停止までに経過・蓄積されたミリ秒
    let timerDuration = 0;       // カウントダウンタイマー設定秒数（ミリ秒換算）

    // ポモドーロ状態
    let pomoState = 'work'; // 'work' or 'break'

    // 勉強記録（本日分秒数）
    let totalStudySeconds = 0;
    let recordTimerId = null; // 勉強時間カウント用

    // DOM要素
    const timeDisplay = document.getElementById('timeDisplay');
    const statusLabel = document.getElementById('statusLabel');
    const timerInputs = document.getElementById('timerInputs');
    const controlPanel = document.getElementById('controlPanel');
    const startBtn = document.getElementById('startBtn');
    const totalDisplay = document.getElementById('totalDisplay');

    // 初期化ロード
    window.onload = function() {
        loadStudyLog();
        switchMode('clock');
    };

    function switchMode(mode) {
        // 現在走っているタイマーを安全に停止
        stopAllIntervals();
        isRunning = false;
        currentMode = mode;
        
        // タブ切り替え
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // ボタンリセット
        startBtn.classList.remove('active-pause');
        startBtn.innerText = 'START';

        // 初期化クリア
        elapsedTimeAtPause = 0;

        if (mode === 'clock') {
            timerInputs.classList.add('hidden');
            controlPanel.classList.add('hidden');
            statusLabel.innerText = 'CURRENT TIME';
            runClock();
        } else if (mode === 'pomodoro') {
            timerInputs.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            pomoState = 'work';
            statusLabel.innerText = 'POMODORO: FOCUS (25m)';
            timerDuration = 25 * 60 * 1000;
            updateCountdownDisplay(timerDuration);
        } else if (mode === 'timer') {
            timerInputs.classList.remove('hidden');
            controlPanel.classList.remove('hidden');
            statusLabel.innerText = 'COUNTDOWN TIMER';
            syncTimerInput();
        } else if (mode === 'stopwatch') {
            timerInputs.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            statusLabel.innerText = 'STOPWATCH';
            updateStopwatchDisplay(0);
        }
    }

    function stopAllIntervals() {
        if (timerId) clearInterval(timerId);
        if (recordTimerId) clearInterval(recordTimerId);
        timerId = null;
        recordTimerId = null;
    }

    // 1) 時計モード
    function runClock() {
        const update = () => {
            const now = new Date();
            timeDisplay.innerText = 
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0') + ':' +
                String(now.getSeconds()).padStart(2, '0');
        };
        update();
        timerId = setInterval(update, 250);
    }

    // 2) 表示更新関数群
    function updateCountdownDisplay(ms) {
        if (ms < 0) ms = 0;
        const totalSecs = Math.ceil(ms / 1000);
        const m = String(Math.floor(totalSecs / 60)).padStart(2, '0');
        const s = String(totalSecs % 60).padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}:00`;
    }

    function updateStopwatchDisplay(ms) {
        const totalSecs = Math.floor(ms / 1000);
        const m = String(Math.floor(totalSecs / 60)).padStart(2, '0');
        const s = String(totalSecs % 60).padStart(2, '0');
        const centiSecs = String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}:${centiSecs}`;
    }

    function syncTimerInput() {
        const min = parseInt(document.getElementById('inputMin').value) || 0;
        const sec = parseInt(document.getElementById('inputSec').value) || 0;
        timerDuration = ((min * 60) + sec) * 1000;
        updateCountdownDisplay(timerDuration);
    }

    // 入力監視
    document.getElementById('inputMin').addEventListener('input', () => { if(!isRunning && currentMode==='timer') { syncTimerInput(); elapsedTimeAtPause=0; } });
    document.getElementById('inputSec').addEventListener('input', () => { if(!isRunning && currentMode==='timer') { syncTimerInput(); elapsedTimeAtPause=0; } });


    // 3) トリガー制御
    function toggleStart() {
        if (!isRunning) {
            // スタート処理
            isRunning = true;
            startBtn.innerText = 'PAUSE';
            startBtn.classList.add('active-pause');
            startTime = Date.now();

            if (currentMode === 'timer' && elapsedTimeAtPause === 0) {
                syncTimerInput();
            }

            // メイン処理ループ
            timerId = setInterval(() => {
                const now = Date.now();
                const diff = now - startTime + elapsedTimeAtPause;

                if (currentMode === 'stopwatch') {
                    updateStopwatchDisplay(diff);
                } else {
                    // カウントダウン（タイマー / ポモドーロ）
                    let remaining = timerDuration - diff;
                    if (remaining <= 0) {
                        handleTimeUp();
                    } else {
                        updateCountdownDisplay(remaining);
                    }
                }
            }, 30);

            // 勉強時間カウント（ストップウォッチ、またはポモドーロのFOCUS、通常のタイマー稼働時に加算）
            if (currentMode === 'stopwatch' || currentMode === 'timer' || (currentMode === 'pomodoro' && pomoState === 'work')) {
                let lastRecordTime = Date.now();
                recordTimerId = setInterval(() => {
                    const rNow = Date.now();
                    totalStudySeconds += (rNow - lastRecordTime) / 1000;
                    lastRecordTime = rNow;
                    updateStudyLogDisplay();
                }, 1000);
            }

        } else {
            // 一時停止処理
            isRunning = false;
            startBtn.innerText = 'START';
            startBtn.classList.remove('active-pause');
            
            // 現在までの経過時間を記憶
            elapsedTimeAtPause += (Date.now() - startTime);
            
            stopAllIntervals();
            saveStudyLog();
        }
    }

    function reset() {
        stopAllIntervals();
        isRunning = false;
        startBtn.innerText = 'START';
        startBtn.classList.remove('active-pause');
        elapsedTimeAtPause = 0;

        if (currentMode === 'pomodoro') {
            pomoState = 'work';
            statusLabel.innerText = 'POMODORO: FOCUS (25m)';
            timerDuration = 25 * 60 * 1000;
            updateCountdownDisplay(timerDuration);
        } else if (currentMode === 'timer') {
            syncTimerInput();
        } else if (currentMode === 'stopwatch') {
            updateStopwatchDisplay(0);
        }
        saveStudyLog();
    }

    function handleTimeUp() {
        stopAllIntervals();
        isRunning = false;
        startBtn.innerText = 'START';
        startBtn.classList.remove('active-pause');
        elapsedTimeAtPause = 0;

        // 電子アラーム音をWeb Audio APIで生成
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);

        if (currentMode === 'pomodoro') {
            if (pomoState === 'work') {
                alert('FOCUSタイム終了。5分間の休憩に入ります。');
                pomoState = 'break';
                statusLabel.innerText = 'POMODORO: BREAK (5m)';
                timerDuration = 5 * 60 * 1000;
            } else {
                alert('BREAKタイム終了。25分間の集中に入ります。');
                pomoState = 'work';
                statusLabel.innerText = 'POMODORO: FOCUS (25m)';
                timerDuration = 25 * 60 * 1000;
            }
            updateCountdownDisplay(timerDuration);
        } else {
            alert('設定時間になりました。');
            syncTimerInput();
        }
        saveStudyLog();
    }

    // 4) 勉強時間の永続化（LocalStorage）
    function updateStudyLogDisplay() {
        const total = Math.floor(totalStudySeconds);
        const h = String(Math.floor(total / 3600)).padStart(2, '0');
        const m = String(Math.floor((total % 3600) / 60)).padStart(2, '0');
        const s = String(total % 60).padStart(2, '0');
        totalDisplay.innerText = `${h}h ${m}m ${s}s`;
    }

    function saveStudyLog() {
        const today = new Date().toISOString().split('T')[0];
        localStorage.setItem('study_date', today);
        localStorage.setItem('study_seconds', totalStudySeconds.toString());
    }

    function loadStudyLog() {
        const today = new Date().toISOString().split('T')[0];
        const savedDate = localStorage.getItem('study_date');
        
        if (savedDate === today) {
            totalStudySeconds = parseFloat(localStorage.getItem('study_seconds')) || 0;
        } else {
            // 日付が変わっていたら自動リセット
            totalStudySeconds = 0;
            saveStudyLog();
        }
        updateStudyLogDisplay();
    }

    function clearLog() {
        if(confirm('本日の勉強記録データをリセットしますか？')) {
            totalStudySeconds = 0;
            saveStudyLog();
            updateStudyLogDisplay();
        }
    }
</script>

</body>
</html>
