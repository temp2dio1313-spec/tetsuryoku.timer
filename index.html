<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono - Minimal Study Timer</title>
    <style>
        :root {
            --bg-color: #090d12;       /* 深く静かな漆黒に近いネイビー */
            --text-main: #f8fafc;     /* 純白に近いクリアなグレー */
            --text-sub: #475569;      /* 控えめなグレー */
            --accent: #60a5fa;        /* 繊細なライトブルー */
            --border: rgba(255, 255, 255, 0.04);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 0.05em;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* モード選択（上部の繊細なナビゲーション） */
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.15em;
            cursor: pointer;
            padding: 4px 0;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-btn:hover {
            color: var(--text-main);
        }

        .nav-btn.active {
            color: var(--accent);
        }

        /* メインカウンター表示 */
        .display-area {
            text-align: center;
            margin-bottom: 50px;
        }

        .label {
            font-size: 10px;
            color: var(--text-sub);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 12px;
            height: 12px;
        }

        .time {
            font-size: 64px;
            font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
            font-weight: 200;
            line-height: 1;
            color: var(--text-main);
        }

        /* フォーム（タイマー設定時のみ） */
        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: -20px;
            margin-bottom: 40px;
        }

        .input-group input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--text-sub);
            color: var(--text-main);
            font-family: 'SF Mono', monospace;
            font-size: 18px;
            width: 45px;
            text-align: center;
            padding: 4px 0;
        }

        .input-group input:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }

        .input-group span {
            font-size: 11px;
            color: var(--text-sub);
            margin-right: 4px;
        }

        /* 操作ボタン */
        .action-group {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 12px;
            letter-spacing: 0.1em;
            cursor: pointer;
            padding: 8px 16px;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.7;
        }

        #startBtn {
            color: var(--accent);
            font-weight: 500;
        }

        /* 記録セクション */
        .footer-log {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            text-align: center;
        }

        .log-label {
            font-size: 10px;
            color: var(--text-sub);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .log-time {
            font-size: 16px;
            font-family: 'SF Mono', monospace;
            color: var(--text-main);
            font-weight: 300;
        }

        .clear-trigger {
            display: block;
            margin: 12px auto 0;
            background: none;
            border: none;
            color: #ef4444;
            font-size: 9px;
            letter-spacing: 0.05em;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
        }

        .clear-trigger:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="nav">
        <button class="nav-btn active" onclick="switchMode('clock')">CLOCK</button>
        <button class="nav-btn" onclick="switchMode('pomodoro')">POMODORO</button>
        <button class="nav-btn" onclick="switchMode('timer')">TIMER</button>
        <button class="nav-btn" onclick="switchMode('stopwatch')">STOPWATCH</button>
    </div>

    <div class="display-area">
        <div id="statusLabel" class="label"></div>
        <div id="timeDisplay" class="time">00:00:00</div>
    </div>

    <div id="timerInputs" class="input-group hidden">
        <input type="number" id="inputMin" min="0" max="180" value="25">
        <span>M</span>
        <input type="number" id="inputSec" min="0" max="59" value="0">
        <span>S</span>
    </div>

    <div id="controlPanel" class="action-group hidden">
        <button id="startBtn" class="action-btn" onclick="toggleStart()">START</button>
        <button id="resetBtn" class="action-btn" onclick="reset()">RESET</button>
    </div>

    <div class="footer-log">
        <div class="log-label">Today's Focus</div>
        <div id="totalDisplay" class="log-time">00:00:00</div>
        <button class="clear-trigger" onclick="clearLog()">CLEAR DATA</button>
    </div>
</div>

<script>
    let currentMode = 'clock';
    let timerId = null;
    let recordTimerId = null;
    let isRunning = false;
    
    let startTime = 0;
    let elapsedTimeAtPause = 0; 
    let timerDuration = 0;       
    let pomoState = 'work'; 
    let totalStudySeconds = 0;

    const timeDisplay = document.getElementById('timeDisplay');
    const statusLabel = document.getElementById('statusLabel');
    const timerInputs = document.getElementById('timerInputs');
    const controlPanel = document.getElementById('controlPanel');
    const startBtn = document.getElementById('startBtn');
    const totalDisplay = document.getElementById('totalDisplay');

    window.onload = function() {
        loadStudyLog();
        switchMode('clock');
    };

    function switchMode(mode) {
        stopAllIntervals();
        isRunning = false;
        currentMode = mode;
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');

        startBtn.innerText = 'START';
        elapsedTimeAtPause = 0;

        if (mode === 'clock') {
            timerInputs.classList.add('hidden');
            controlPanel.classList.add('hidden');
            statusLabel.innerText = 'CLOCK';
            runClock();
        } else if (mode === 'pomodoro') {
            timerInputs.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            pomoState = 'work';
            statusLabel.innerText = 'FOCUS';
            timerDuration = 25 * 60 * 1000;
            updateCountdownDisplay(timerDuration);
        } else if (mode === 'timer') {
            timerInputs.classList.remove('hidden');
            controlPanel.classList.remove('hidden');
            statusLabel.innerText = 'TIMER';
            syncTimerInput();
        } else if (mode === 'stopwatch') {
            timerInputs.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            statusLabel.innerText = 'STOPWATCH';
            updateStopwatchDisplay(0);
        }
    }

    function stopAllIntervals() {
        if (timerId) clearInterval(timerId);
        if (recordTimerId) clearInterval(recordTimerId);
        timerId = null;
        recordTimerId = null;
    }

    function runClock() {
        const update = () => {
            const now = new Date();
            timeDisplay.innerText = 
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0') + ':' +
                String(now.getSeconds()).padStart(2, '0');
        };
        update();
        timerId = setInterval(update, 250);
    }

    function updateCountdownDisplay(ms) {
        if (ms < 0) ms = 0;
        const totalSecs = Math.ceil(ms / 1000);
        const m = String(Math.floor(totalSecs / 60)).padStart(2, '0');
        const s = String(totalSecs % 60).padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}:00`;
    }

    function updateStopwatchDisplay(ms) {
        const totalSecs = Math.floor(ms / 1000);
        const m = String(Math.floor(totalSecs / 60)).padStart(2, '0');
        const s = String(totalSecs % 60).padStart(2, '0');
        const centiSecs = String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
        timeDisplay.innerText = `${m}:${s}:${centiSecs}`;
    }

    function syncTimerInput() {
        const min = parseInt(document.getElementById('inputMin').value) || 0;
        const sec = parseInt(document.getElementById('inputSec').value) || 0;
        timerDuration = ((min * 60) + sec) * 1000;
        updateCountdownDisplay(timerDuration);
    }

    document.getElementById('inputMin').addEventListener('input', () => { if(!isRunning && currentMode==='timer') { syncTimerInput(); elapsedTimeAtPause=0; } });
    document.getElementById('inputSec').addEventListener('input', () => { if(!isRunning && currentMode==='timer') { syncTimerInput(); elapsedTimeAtPause=0; } });

    function toggleStart() {
        if (!isRunning) {
            isRunning = true;
            startBtn.innerText = 'PAUSE';
            startTime = Date.now();

            if (currentMode === 'timer' && elapsedTimeAtPause === 0) {
                syncTimerInput();
            }

            timerId = setInterval(() => {
                const now = Date.now();
                const diff = now - startTime + elapsedTimeAtPause;

                if (currentMode === 'stopwatch') {
                    updateStopwatchDisplay(diff);
                } else {
                    let remaining = timerDuration - diff;
                    if (remaining <= 0) {
                        handleTimeUp();
                    } else {
                        updateCountdownDisplay(remaining);
                    }
                }
            }, 30);

            if (currentMode === 'stopwatch' || currentMode === 'timer' || (currentMode === 'pomodoro' && pomoState === 'work')) {
                let lastRecordTime = Date.now();
                recordTimerId = setInterval(() => {
                    const rNow = Date.now();
                    totalStudySeconds += (rNow - lastRecordTime) / 1000;
                    lastRecordTime = rNow;
                    updateStudyLogDisplay();
                }, 1000);
            }
        } else {
            isRunning = false;
            startBtn.innerText = 'START';
            elapsedTimeAtPause += (Date.now() - startTime);
            stopAllIntervals();
            saveStudyLog();
        }
    }

    function reset() {
        stopAllIntervals();
        isRunning = false;
        startBtn.innerText = 'START';
        elapsedTimeAtPause = 0;

        if (currentMode === 'pomodoro') {
            pomoState = 'work';
            statusLabel.innerText = 'FOCUS';
            timerDuration = 25 * 60 * 1000;
            updateCountdownDisplay(timerDuration);
        } else if (currentMode === 'timer') {
            syncTimerInput();
        } else if (currentMode === 'stopwatch') {
            updateStopwatchDisplay(0);
        }
        saveStudyLog();
    }

    function handleTimeUp() {
        stopAllIntervals();
        isRunning = false;
        startBtn.innerText = 'START';
        elapsedTimeAtPause = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);

        if (currentMode === 'pomodoro') {
            if (pomoState === 'work') {
                alert('FOCUS TIME END. TAKE A BREAK.');
                pomoState = 'break';
                statusLabel.innerText = 'BREAK';
                timerDuration = 5 * 60 * 1000;
            } else {
                alert('BREAK TIME END. FOCUS AGAIN.');
                pomoState = 'work';
                statusLabel.innerText = 'FOCUS';
                timerDuration = 25 * 60 * 1000;
            }
            updateCountdownDisplay(timerDuration);
        } else {
            alert('TIME UP.');
            syncTimerInput();
        }
        saveStudyLog();
    }

    function updateStudyLogDisplay() {
        const total = Math.floor(totalStudySeconds);
        const h = String(Math.floor(total / 3600)).padStart(2, '0');
        const m = String(Math.floor((total % 3600) / 60)).padStart(2, '0');
        const s = String(total % 60).padStart(2, '0');
        totalDisplay.innerText = `${h}:${m}:${s}`;
    }

    function saveStudyLog() {
        const today = new Date().toISOString().split('T')[0];
        localStorage.setItem('study_date_min', today);
        localStorage.setItem('study_seconds_min', totalStudySeconds.toString());
    }

    function loadStudyLog() {
        const today = new Date().toISOString().split('T')[0];
        const savedDate = localStorage.getItem('study_date_min');
        
        if (savedDate === today) {
            totalStudySeconds = parseFloat(localStorage.getItem('study_seconds_min')) || 0;
        } else {
            totalStudySeconds = 0;
            saveStudyLog();
        }
        updateStudyLogDisplay();
    }

    function clearLog() {
        if(confirm('本日のデータをリセットしますか？')) {
            totalStudySeconds = 0;
            saveStudyLog();
            updateStudyLogDisplay();
        }
    }
</script>
</body>
</html>
