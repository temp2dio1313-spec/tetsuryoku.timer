<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄緑会風 宿命打破タイマー</title>
    <style>
        :root {
            --bg-color: #0d1b15;       /* 深い鉄緑 */
            --panel-bg: #162a20;       /* パネルの背景 */
            --accent-gold: #c5a880;   /* 落ち着いたゴールド */
            --text-main: #e2e8f0;     /* メイン文字 */
            --text-sub: #8a9a86;      /* サブ文字 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 1px solid var(--accent-gold);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
        }

        /* 鉄緑会風ヘッダー */
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px double var(--accent-gold);
            padding-bottom: 15px;
        }

        .header h1 {
            font-family: 'Times New Roman', 'Yu Mincho', '遊明朝', serif;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 0.15em;
            color: var(--accent-gold);
            margin: 0 0 5px 0;
        }

        .header p {
            font-size: 11px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin: 0;
        }

        /* タブメニュー */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(197, 168, 128, 0.3);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            padding: 10px 5px;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: var(--accent-gold);
        }

        .tab-btn.active {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
            font-weight: bold;
        }

        /* 表示エリア */
        .display-panel {
            text-align: center;
            margin-bottom: 30px;
        }

        .time-display {
            font-size: 56px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: var(--text-main);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .status-label {
            font-size: 12px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            height: 15px;
        }

        /* コントロールエリア */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 90px;
        }

        .btn:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        .btn:disabled {
            border-color: rgba(197, 168, 128, 0.2);
            color: rgba(197, 168, 128, 0.2);
            cursor: not-allowed;
        }

        /* 設定エリア（タイマー用） */
        .inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .inputs input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(197, 168, 128, 0.5);
            color: var(--text-main);
            padding: 8px;
            width: 60px;
            text-align: center;
            font-size: 16px;
            border-radius: 2px;
        }

        .inputs label {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* 非表示クラス */
        .hidden {
            display: none !important;
        }

        /* 格言（鉄緑会スピリッツ） */
        .motto {
            text-align: center;
            font-size: 11px;
            color: var(--text-sub);
            border-top: 1px solid rgba(197, 168, 128, 0.15);
            padding-top: 15px;
            font-family: 'Yu Mincho', serif;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>鉄緑会 自習室タイマー</h1>
        <p>In pursuit of absolute academic perfection</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('clock')">時計</button>
        <button class="tab-btn" onclick="switchMode('pomodoro')">ポモドーロ</button>
        <button class="tab-btn" onclick="switchMode('timer')">タイマー</button>
        <button class="tab-btn" onclick="switchMode('stopwatch')">ストップウォッチ</button>
    </div>

    <div class="display-panel">
        <div id="statusLabel" class="status-label">CURRENT TIME</div>
        <div id="timeDisplay" class="time-display">00:00:00</div>
    </div>

    <div id="timerInputs" class="inputs hidden">
        <input type="number" id="inputMin" min="0" max="180" value="25">
        <label for="inputMin">分</label>
        <input type="number" id="inputSec" min="0" max="59" value="0">
        <label for="inputSec">秒</label>
    </div>

    <div id="controlPanel" class="controls hidden">
        <button id="startBtn" class="btn" onclick="start()"></button>
        <button id="resetBtn" class="btn" onclick="reset()">リセット</button>
    </div>

    <div class="motto" id="mottoText">
        「一種の修練として、1点を削り出す作業に没頭せよ。」
    </div>
</div>
